<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
<title>Nexus</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
  body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; background: #050505; color: #e5e5e5; min-height: 100vh; overflow-x: hidden; }
  .screen { display: none; padding: 24px 16px; animation: fadeIn 0.25s ease; }
  .screen.active { display: block; }
  @keyframes fadeIn { from { opacity: 0; transform: translateY(8px);} to { opacity: 1; transform: none;} }
  .card { background: #0f0f0f; border: 1px solid #1f1f1f; border-radius: 16px; padding: 20px; margin-bottom: 12px; box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
  input, textarea { width: 100%; background: #0a0a0a; border: 1px solid #2a2a2a; border-radius: 12px; padding: 14px 16px; color: #e5e5e5; font-size: 15px; outline: none; transition: border-color 0.2s; }
  input:focus, textarea:focus { border-color: #3a3a3a; }
  button { width: 100%; background: #1a1a1a; border: 1px solid #2a2a2a; border-radius: 12px; padding: 14px; color: #e5e5e5; font-size: 15px; font-weight: 500; cursor: pointer; transition: transform 0.1s, background 0.2s; }
  button:active { transform: scale(0.98); background: #222; }
  button.primary { background: #1f1f1f; border-color: #333; }
  .title { font-size: 28px; font-weight: 700; margin-bottom: 4px; letter-spacing: -0.5px; }
  .subtitle { color: #666; font-size: 13px; margin-bottom: 20px; }
  .status { font-size: 12px; color: #888; margin-top: 8px; text-align: center; }
  .status.online { color: #4ade80; }
  .status.searching { color: #facc15; }
  .peer-item { background: #0a0a0a; border: 1px solid #1f1f1f; border-radius: 12px; padding: 12px 14px; margin-bottom: 8px; display: flex; justify-content: space-between; align-items: center; }
  .peer-item button { width: auto; padding: 8px 14px; font-size: 13px; margin-left: 8px; }
  .msg { padding: 10px 12px; border-radius: 12px; margin-bottom: 6px; font-size: 14px; line-height: 1.4; word-break: break-word; }
  .msg.sent { background: #1a1a1a; margin-left: 20%; }
  .msg.recv { background: #0f0f0f; border: 1px solid #1f1f1f; margin-right: 20%; }
  .msg-time { font-size: 10px; color: #555; margin-top: 2px; }
  .map-container { width: 100%; height: 320px; background: #0a0a0a; border-radius: 12px; border: 1px solid #1f1f1f; overflow: hidden; position: relative; margin-top: 10px; }
  .map-placeholder { display: flex; align-items: center; justify-content: center; height: 100%; color: #555; font-size: 13px; }
  .empty { text-align: center; color: #555; padding: 40px 20px; font-size: 14px; }
  .nav { position: fixed; bottom: 0; left: 0; right: 0; background: rgba(5,5,5,0.9); backdrop-filter: blur(12px); border-top: 1px solid #1f1f1f; display: flex; justify-content: space-around; padding: 10px 0 calc(10px + env(safe-area-inset-bottom)); z-index: 10; }
  .nav-item { flex: 1; text-align: center; font-size: 11px; color: #666; cursor: pointer; background: none; border: none; padding: 6px 0; }
  .nav-item.active { color: #e5e5e5; }
  .nav-icon { font-size: 20px; display: block; margin-bottom: 2px; }
  .fab { position: fixed; bottom: 72px; right: 16px; width: 52px; height: 52px; border-radius: 26px; background: #1f1f1f; border: 1px solid #333; color: #e5e5e5; font-size: 24px; display: flex; align-items: center; justify-content: center; cursor: pointer; box-shadow: 0 8px 24px rgba(0,0,0,0.6); z-index: 9; }
</style>
</head>
<body>

<div id="login" class="screen active">
  <div class="card">
    <div class="title">Nexus</div>
    <div class="subtitle">Acesso seguro</div>
    <input id="pinInput" placeholder="PIN" inputmode="numeric" maxlength="20">
    <input id="wordInput" placeholder="Palavra" type="password" style="margin-top:10px">
    <button class="primary" onclick="app.join()">Entrar</button>
    <button onclick="app.create()" style="margin-top:8px">Criar sala</button>
    <div id="loginStatus" class="status"></div>
  </div>
</div>

<div id="home" class="screen">
  <div class="card">
    <div class="title">Nexus</div>
    <div class="subtitle" id="roomLabel">Sala --</div>
    <div id="peers" class="status searching">Procurando dispositivos...</div>
  </div>
  <div class="nav">
    <button class="nav-item active" onclick="app.nav('chat')"><span class="nav-icon">💬</span>Chat</button>
    <button class="nav-item" onclick="app.nav('loc')"><span class="nav-icon">📍</span>Local</button>
    <button class="nav-item" onclick="app.nav('photo')"><span class="nav-icon">📷</span>Fotos</button>
  </div>
</div>

<div id="chatScreen" class="screen">
  <div class="card" style="padding:12px;margin-bottom:0">
    <div style="display:flex;justify-content:space-between;align-items:center">
      <div class="title" style="font-size:18px">Chat</div>
      <button onclick="app.nav('home')" style="width:auto;padding:8px 12px;font-size:13px">Voltar</button>
    </div>
  </div>
  <div id="chatList" style="padding:12px 16px 80px;min-height:60vh"></div>
  <div style="position:fixed;bottom:0;left:0;right:0;background:linear-gradient(transparent,#050505 20%);padding:12px 16px calc(12px + env(safe-area-inset-bottom))">
    <div style="display:flex;gap:8px">
      <input id="chatInput" placeholder="Mensagem" style="flex:1">
      <button onclick="app.sendChat()" style="width:auto;padding:10px 18px">Enviar</button>
    </div>
  </div>
</div>

<div id="locScreen" class="screen">
  <div class="card" style="padding:12px;margin-bottom:0">
    <div style="display:flex;justify-content:space-between;align-items:center">
      <div class="title" style="font-size:18px">Localização</div>
      <button onclick="app.nav('home')" style="width:auto;padding:8px 12px;font-size:13px">Voltar</button>
    </div>
  </div>
  <div class="map-container"><div id="map" class="map-placeholder">Mapa indisponível</div></div>
  <div style="padding:16px">
    <button class="primary" onclick="app.sendLocation()">Compartilhar localização</button>
    <button onclick="app.viewLocation()" style="margin-top:8px">Ver localização</button>
  </div>
</div>

<div id="photoScreen" class="screen">
  <div class="card" style="padding:12px;margin-bottom:0">
    <div style="display:flex;justify-content:space-between;align-items:center">
      <div class="title" style="font-size:18px">Fotos</div>
      <button onclick="app.nav('home')" style="width:auto;padding:8px 12px;font-size:13px">Voltar</button>
    </div>
  </div>
  <div id="photoList" style="padding:16px"><div class="empty">Nenhuma foto</div></div>
  <div style="position:fixed;bottom:0;left:0;right:0;background:linear-gradient(transparent,#050505 20%);padding:12px 16px calc(12px + env(safe-area-inset-bottom))">
    <button class="primary" onclick="app.sendPhoto()">Tirar foto</button>
  </div>
</div>

<script>
const app = {
  pin: '',
  word: '',
  keyHex: '',
  salt: '',
  ws: null,
  port: 3001,
  host: location.hostname || '192.168.18.14',
  messages: [],
  
  api(path, body) {
    return fetch(`http://${this.host}:${this.port}${path}`, { method: 'POST', headers: {'Content-Type':'application/json'}, body: JSON.stringify(body || {}) }).then(r => r.json());
  },
  
  async join() {
    const pin = document.getElementById('pinInput').value.trim();
    const word = document.getElementById('wordInput').value;
    if (!pin) return;
    const r = await this.api('/api/join', { pin, word });
    if (r.ok) {
      this.pin = pin; this.word = word || '';
      this.salt = r.salt || '00000000000000000000000000000000';
      this.keyHex = await this.deriveKey(word || pin);
      this.show('home');
      this.setupP2P();
    } else {
      document.getElementById('loginStatus').textContent = 'PIN/palavra inválidos';
    }
  },
  
  async create() {
    const pin = document.getElementById('pinInput').value.trim();
    const word = document.getElementById('wordInput').value;
    if (!pin || !word) return;
    const r = await this.api('/api/create', { pin, word });
    if (r.ok) {
      this.pin = pin; this.word = word;
      this.salt = r.salt || '00000000000000000000000000000000';
      this.keyHex = await this.deriveKey(word);
      this.show('home');
      this.setupP2P();
    } else {
      document.getElementById('loginStatus').textContent = 'Erro ao criar';
    }
  },
  
  async deriveKey(word) {
    const enc = new TextEncoder();
    const keyMaterial = await crypto.subtle.importKey('raw', enc.encode(word), 'PBKDF2', false, ['deriveKey']);
    return crypto.subtle.deriveKey({ name: 'PBKDF2', salt: enc.encode(this.salt), iterations: 100000, hash: 'SHA-256' }, keyMaterial, { name: 'AES-GCM', length: 256 }, false, ['encrypt', 'decrypt']).then(k => k);
  },
  
  setupP2P() {
    document.getElementById('roomLabel').textContent = `Sala ${this.pin}`;
    this.ws = new WebSocket(`ws://${this.host}:${this.port}/ws?pin=${encodeURIComponent(this.pin)}`);
    this.ws.onopen = () => console.log('ws open');
    this.ws.onmessage = (ev) => {
      const msg = JSON.parse(ev.data);
      this.handle(msg);
    };
    this.ws.onerror = () => {};
    this.ws.onclose = () => setTimeout(() => this.setupP2P(), 2000);
  },
  
  handle(msg) {
    if (msg.type === 'chat') {
      this.addChat(msg.data, false);
    } else if (msg.type === 'location') {
      this.addLocation(msg.data);
    } else if (msg.type === 'photo') {
      this.addPhoto(msg.data);
    }
  },
  
  show(id) {
    document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
    document.getElementById(id).classList.add('active');
  },
  
  nav(section) {
    this.show(section + 'Screen');
    document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
    event.target.closest('.nav-item').classList.add('active');
  },
  
  addChat(data, sent) {
    const chatList = document.getElementById('chatList');
    const div = document.createElement('div');
    div.className = 'msg ' + (sent ? 'sent' : 'recv');
    div.innerHTML = `<div>${data}</div><div class="msg-time">${new Date().toLocaleTimeString('pt-BR', {hour:'2-digit', minute:'2-digit'})}</div>`;
    chatList.appendChild(div);
    chatList.scrollTop = chatList.scrollHeight;
  },
  
  async sendChat() {
    const input = document.getElementById('chatInput');
    const text = input.value.trim();
    if (!text) return;
    const key = await this.deriveKey(this.word || this.pin);
    const enc = await this.encrypt(text, key);
    this.ws.send(JSON.stringify({ type: 'chat', data: enc }));
    this.addChat(text, true);
    input.value = '';
  },
  
  async encrypt(plaintext, key) {
    const iv = crypto.getRandomValues(new Uint8Array(12));
    const ct = await crypto.subtle.encrypt({ name: 'AES-GCM', iv }, key, new TextEncoder().encode(plaintext));
    const buf = new Uint8Array(iv.length + ct.byteLength);
    buf.set(iv); buf.set(new Uint8Array(ct), iv.length);
    return btoa(String.fromCharCode(...buf));
  },
  
  async decrypt(data, key) {
    try {
      const raw = Uint8Array.from(atob(data), c => c.charCodeAt(0));
      const iv = raw.slice(0, 12);
      const ct = raw.slice(12);
      const pt = await crypto.subtle.decrypt({ name: 'AES-GCM', iv }, key, ct);
      return new TextDecoder().decode(pt);
    } catch { return '[Erro]'; }
  },
  
  sendLocation() { console.log('sendLocation'); },
  viewLocation() { console.log('viewLocation'); },
  sendPhoto() { console.log('sendPhoto'); },
  addPhoto(data) { console.log('photo', data); }
};

document.getElementById('chatInput').addEventListener('keydown', e => { if (e.key === 'Enter') app.sendChat(); });
</script>
</body>
</html>
