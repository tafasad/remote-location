<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
<title>Nexus</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
  body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; background: #050505; color: #e5e5e5; min-height: 100vh; }
  .screen { display: none; padding: 20px 14px; animation: fadeIn 0.2s ease; }
  .screen.active { display: block; }
  @keyframes fadeIn { from { opacity: 0; transform: translateY(6px);} to { opacity: 1; transform: none;} }
  .card { background: #0f0f0f; border: 1px solid #1f1f1f; border-radius: 16px; padding: 18px; margin-bottom: 10px; box-shadow: 0 8px 24px rgba(0,0,0,0.5); }
  input, textarea { width: 100%; background: #0a0a0a; border: 1px solid #2a2a2a; border-radius: 12px; padding: 12px 14px; color: #e5e5e5; font-size: 14px; outline: none; }
  input:focus, textarea:focus { border-color: #3a3a3a; }
  button { width: 100%; background: #1a1a1a; border: 1px solid #2a2a2a; border-radius: 12px; padding: 12px; color: #e5e5e5; font-size: 14px; font-weight: 500; cursor: pointer; }
  button:active { background: #222; }
  button.primary { background: #1f1f1f; border-color: #333; }
  .title { font-size: 24px; font-weight: 700; margin-bottom: 2px; }
  .subtitle { color: #666; font-size: 12px; margin-bottom: 14px; }
  .status { font-size: 11px; color: #888; margin-top: 6px; text-align: center; }
  .msg { padding: 10px 12px; border-radius: 12px; margin-bottom: 6px; font-size: 13px; line-height: 1.4; word-break: break-word; }
  .msg.sent { background: #1a1a1a; margin-left: 18%; }
  .msg.recv { background: #0f0f0f; border: 1px solid #1f1f1f; margin-right: 18%; }
  .msg-time { font-size: 10px; color: #555; margin-top: 2px; }
  .nav { position: fixed; bottom: 0; left: 0; right: 0; background: rgba(5,5,5,0.92); backdrop-filter: blur(10px); border-top: 1px solid #1f1f1f; display: flex; justify-content: space-around; padding: 8px 0 calc(8px + env(safe-area-inset-bottom)); z-index: 10; }
  .nav-item { flex: 1; text-align: center; font-size: 10px; color: #666; cursor: pointer; background: none; border: none; padding: 4px 0; }
  .nav-item.active { color: #e5e5e5; }
  .nav-icon { font-size: 18px; display: block; margin-bottom: 1px; }
  .fab { position: fixed; bottom: 64px; right: 14px; width: 48px; height: 48px; border-radius: 24px; background: #1f1f1f; border: 1px solid #333; color: #e5e5e5; font-size: 22px; display: flex; align-items: center; justify-content: center; cursor: pointer; box-shadow: 0 6px 20px rgba(0,0,0,0.6); z-index: 9; }
  .media-item { background: #0a0a0a; border: 1px solid #1f1f1f; border-radius: 12px; padding: 10px 12px; margin-bottom: 8px; display: flex; align-items: center; gap: 10px; }
  .media-thumb { width: 48px; height: 48px; border-radius: 8px; object-fit: cover; background: #111; }
</style>
</head>
<body>

<div id="login" class="screen active">
  <div class="card">
    <div class="title">Nexus</div>
    <div class="subtitle">Acesso</div>
    <input id="serverInput" placeholder="Servidor (opcional)" value="">
    <input id="pinInput" placeholder="PIN" inputmode="numeric" maxlength="20" style="margin-top:8px">
    <input id="wordInput" placeholder="Palavra" type="password" style="margin-top:8px">
    <button class="primary" onclick="app.join()" style="margin-top:10px">Entrar</button>
    <button onclick="app.create()" style="margin-top:8px">Criar sala</button>
    <div id="loginStatus" class="status"></div>
  </div>
</div>

<div id="home" class="screen">
  <div class="card">
    <div class="title">Nexus</div>
    <div class="subtitle" id="roomLabel">Sala --</div>
    <div id="peers" class="status">Conectado</div>
    <button id="updateBtn" class="primary" onclick="app.checkUpdate()" style="margin-top:10px;display:none">Atualizar Nexus</button>
  </div>
  <div class="nav">
    <button class="nav-item active" onclick="app.nav('chat')"><span class="nav-icon">💬</span>Chat</button>
    <button class="nav-item" onclick="app.nav('loc')"><span class="nav-icon">📍</span>Local</button>
    <button class="nav-item" onclick="app.nav('photo')"><span class="nav-icon">📷</span>Fotos</button>
    <button class="nav-item" onclick="app.nav('audio')"><span class="nav-icon">🎤</span>Áudio</button>
  </div>
</div>

<div id="chatScreen" class="screen">
  <div class="card" style="padding:10px;margin-bottom:0">
    <div style="display:flex;justify-content:space-between;align-items:center">
      <div class="title" style="font-size:16px">Chat</div>
      <button onclick="app.nav('home')" style="width:auto;padding:6px 10px;font-size:12px">Voltar</button>
    </div>
  </div>
  <div id="chatList" style="padding:10px 14px 78px;min-height:60vh"></div>
  <div style="position:fixed;bottom:0;left:0;right:0;background:linear-gradient(transparent,#050505 20%);padding:10px 14px calc(10px + env(safe-area-inset-bottom))">
    <div style="display:flex;gap:8px">
      <input id="chatInput" placeholder="Mensagem" style="flex:1">
      <button onclick="app.sendChat()" style="width:auto;padding:10px 16px">Enviar</button>
    </div>
  </div>
</div>

<div id="locScreen" class="screen">
  <div class="card" style="padding:10px;margin-bottom:0">
    <div style="display:flex;justify-content:space-between;align-items:center">
      <div class="title" style="font-size:16px">Localização</div>
      <button onclick="app.nav('home')" style="width:auto;padding:6px 10px;font-size:12px">Voltar</button>
    </div>
  </div>
  <div class="card" style="margin-top:10px"><div id="locList"></div></div>
  <div style="padding:12px 14px">
    <button class="primary" onclick="app.sendLocation()">Enviar localização</button>
  </div>
</div>

<div id="photoScreen" class="screen">
  <div class="card" style="padding:10px;margin-bottom:0">
    <div style="display:flex;justify-content:space-between;align-items:center">
      <div class="title" style="font-size:16px">Fotos</div>
      <button onclick="app.nav('home')" style="width:auto;padding:6px 10px;font-size:12px">Voltar</button>
    </div>
  </div>
  <div id="photoList" style="padding:12px 14px 78px"></div>
  <div style="position:fixed;bottom:0;left:0;right:0;background:linear-gradient(transparent,#050505 20%);padding:10px 14px calc(10px + env(safe-area-inset-bottom))">
    <button class="primary" onclick="app.sendPhoto()">Tirar/enviar foto</button>
  </div>
</div>

<div id="audioScreen" class="screen">
  <div class="card" style="padding:10px;margin-bottom:0">
    <div style="display:flex;justify-content:space-between;align-items:center">
      <div class="title" style="font-size:16px">Áudio</div>
      <button onclick="app.nav('home')" style="width:auto;padding:6px 10px;font-size:12px">Voltar</button>
    </div>
  </div>
  <div id="audioList" style="padding:12px 14px 78px"></div>
  <div style="position:fixed;bottom:0;left:0;right:0;background:linear-gradient(transparent,#050505 20%);padding:10px 14px calc(10px + env(safe-area-inset-bottom))">
    <button class="primary" onclick="app.sendAudio()">Gravar 10s</button>
  </div>
</div>

<script type="module">
import mqtt from 'https://cdn.jsdelivr.net/npm/mqtt/dist/mqtt.esm.js';
const app = {
  pin: '', word: '', keyHex: null, salt: '', nick: 'user-' + Math.random().toString(36).slice(2,6),
  server: 'broker.hivemq.com', port: 8000, client: null,

  init() {
    this.server = document.getElementById('serverInput').value.trim() || this.server;
  },

  async join() {
    const pin = document.getElementById('pinInput').value.trim();
    const word = document.getElementById('wordInput').value;
    if (!pin) return;
    this.init();
    this.pin = pin;
    this.word = word || '';
    this.salt = crypto.getRandomValues(new Uint8Array(16)).reduce((s,b)=>s+b.toString(16).padStart(2,'0'),'');
    this.keyHex = await this.deriveKey();
    this.connectMqtt();
    this.show('home');
    this.checkUpdate();
    document.getElementById('roomLabel').textContent = `Sala ${pin}`;
  },

  async create() {
    const pin = document.getElementById('pinInput').value.trim();
    const word = document.getElementById('wordInput').value;
    if (!pin || !word) return;
    try {
      const r = await fetch('/api/create', {
        method: 'POST',
        headers: {'Content-Type': 'application/json'},
        body: JSON.stringify({ pin, word })
      });
      const j = await r.json();
      if (!r.ok) return alert(j.error || 'Erro');
    } catch (e) { alert('Sem server'); return; }
    this.pin = pin;
    this.word = word;
    this.salt = crypto.getRandomValues(new Uint8Array(16)).reduce((s,b)=>s+b.toString(16).padStart(2,'0'),'');
    this.keyHex = await this.deriveKey();
    this.connectMqtt();
    this.show('home');
    this.checkUpdate();
    document.getElementById('roomLabel').textContent = `Sala ${pin}`;
  },

  async deriveKey() {
    const enc = new TextEncoder();
    const keyMaterial = await crypto.subtle.importKey('raw', enc.encode(this.word || this.pin), 'PBKDF2', false, ['deriveKey']);
    this.salt = this.salt || '00000000000000000000000000000000';
    return crypto.subtle.deriveKey({ name: 'PBKDF2', salt: enc.encode(this.salt), iterations: 100000, hash: 'SHA-256' }, keyMaterial, { name: 'AES-GCM', length: 256 }, false, ['encrypt', 'decrypt']).then(k => k);
  },

  connectMqtt() {
    const url = `wss://${this.server}:${this.port}/mqtt`;
    this.client = mqtt.connect(url, { clientId: `nexus-${this.nick}`, keepalive: 30 });
    this.client.on('connect', () => {
      this.client.subscribe(`nexus/chat/v3/${this.pin}`);
      this.client.subscribe(`nexus/chat/v3/${this.pin}/media`);
    });
    this.client.on('message', (t, m) => this.onMessage(t, m));
  },

  async onMessage(topic, message) {
    try {
      const payload = JSON.parse(message.toString());
      if (payload.from === this.nick) return;
      const mt = payload.mt;
      if (mt === 'chat') {
        const text = await this.decryptText(payload.d);
        this.appendChat(text, false);
      } else if (mt === 'loc') {
        this.appendLocItem(payload);
      } else if (mt === 'photo') {
        this.appendPhotoItem(payload.d, false);
      } else if (mt === 'audio') {
        this.appendAudioItem(payload.d, false);
      }
    } catch (e) { console.error('msg err', e); }
  },

  async sendChat() {
    const input = document.getElementById('chatInput');
    const text = input.value.trim();
    if (!text) return;
    const d = await this.encryptText(text);
    this.client.publish(`nexus/chat/v3/${this.pin}`, JSON.stringify({ from: this.nick, mt: 'chat', d }));
    this.appendChat(text, true);
    input.value = '';
  },

  async sendLocation() {
    if (!navigator.geolocation) return alert('GPS indisponivel');
    navigator.geolocation.getCurrentPosition(async (pos) => {
      const payload = { from: this.nick, mt: 'loc', lat: pos.coords.latitude, lng: pos.coords.longitude, ts: new Date().toLocaleTimeString('pt-BR', { hour:'2-digit', minute:'2-digit' }) };
      this.client.publish(`nexus/chat/v3/${this.pin}`, JSON.stringify(payload));
      this.appendLocItem({ ...payload, from: 'Voce' }, true);
    }, () => alert('Erro GPS'));
  },

  async sendPhoto() {
    try {
      const input = document.createElement('input');
      input.type = 'file'; input.accept = 'image/*'; input.capture = 'environment';
      input.onchange = async () => {
        const file = input.files[0];
        if (!file) return;
        const data = await this.fileToB64(file);
        const d = await this.encryptText(data);
        this.client.publish(`nexus/chat/v3/${this.pin}/media`, JSON.stringify({ from: this.nick, mt: 'photo', d }));
        this.appendPhotoItem(data, true);
      };
      input.click();
    } catch (e) { alert('Erro foto'); }
  },

  async sendAudio() {
    try {
      const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
      const recorder = new MediaRecorder(stream);
      const chunks = [];
      recorder.ondataavailable = (e) => chunks.push(e.data);
      recorder.onstop = async () => {
        const blob = new Blob(chunks, { type: 'audio/webm' });
        const ab = await blob.arrayBuffer();
        const data = this.arrayToB64(ab);
        const d = await this.encryptText(data);
        this.client.publish(`nexus/chat/v3/${this.pin}/media`, JSON.stringify({ from: this.nick, mt: 'audio', d }));
        this.appendAudioItem(data, true);
        stream.getTracks().forEach(t => t.stop());
      };
      recorder.start();
      setTimeout(() => recorder.stop(), 10000);
    } catch (e) { alert('Erro audio'); }
  },

  async encryptText(plaintext) {
    const iv = crypto.getRandomValues(new Uint8Array(12));
    const ct = await crypto.subtle.encrypt({ name: 'AES-GCM', iv }, this.keyHex, new TextEncoder().encode(plaintext));
    const buf = new Uint8Array(iv.length + ct.byteLength);
    buf.set(iv); buf.set(new Uint8Array(ct), iv.length);
    return this.arrayToB64(buf);
  },

  async decryptText(data) {
    try {
      const raw = this.b64ToArray(data);
      const iv = raw.slice(0, 12);
      const ct = raw.slice(12);
      const pt = await crypto.subtle.decrypt({ name: 'AES-GCM', iv }, this.keyHex, ct);
      return new TextDecoder().decode(pt);
    } catch { return '[Erro]'; }
  },

  arrayToB64(buf) { let binary = ''; const bytes = new Uint8Array(buf); for (let i = 0; i < bytes.byteLength; i++) binary += String.fromCharCode(bytes[i]); return btoa(binary); },
  b64ToArray(b64) { const raw = atob(b64); const bytes = new Uint8Array(raw.length); for (let i = 0; i < raw.length; i++) bytes[i] = raw.charCodeAt(i); return bytes; },
  fileToB64(file) { return new Promise((resolve) => { const reader = new FileReader(); reader.onload = () => resolve(reader.result.split(',')[1]); reader.readAsDataURL(file); }); },

  appendChat(text, sent) {
    const list = document.getElementById('chatList');
    const div = document.createElement('div');
    div.className = 'msg ' + (sent ? 'sent' : 'recv');
    div.innerHTML = `<div>${text}</div><div class="msg-time">${new Date().toLocaleTimeString('pt-BR', { hour:'2-digit', minute:'2-digit' })}</div>`;
    list.appendChild(div);
    list.scrollTop = list.scrollHeight;
  },

  appendLocItem(p, sent=false) {
    const list = document.getElementById('locList');
    const div = document.createElement('div');
    div.className = 'msg ' + (sent ? 'sent' : 'recv');
    div.innerHTML = `<div><b>${p.from||''}</b> @ ${p.ts||''}</div><div>${Number(p.lat).toFixed(5)}, ${Number(p.lng).toFixed(5)}</div>`;
    list.appendChild(div);
  },

  appendPhotoItem(data, local=false) {
    const list = document.getElementById('photoList');
    const div = document.createElement('div');
    div.className = 'media-item';
    const src = 'data:image/jpeg;base64,' + data;
    div.innerHTML = `<img class="media-thumb" src="${src}"><div style="font-size:12px;color:#aaa">${local ? 'Voce' : 'Outro'}</div>`;
    list.appendChild(div);
  },

  appendAudioItem(data, local=false) {
    const list = document.getElementById('audioList');
    const div = document.createElement('div');
    div.className = 'media-item';
    const audio = document.createElement('audio');
    audio.controls = true;
    audio.style.height = '36px';
    audio.src = 'data:audio/wav;base64,' + data;
    div.innerHTML = `<div style="font-size:12px;color:#aaa;flex:1">${local ? 'Voce' : 'Outro'}</div>`;
    div.insertBefore(audio, div.firstChild);
    list.appendChild(div);
  },

  show(id) {
    document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
    document.getElementById(id).classList.add('active');
  },

  nav(section) {
    const map = { chat: 'chatScreen', loc: 'locScreen', photo: 'photoScreen', audio: 'audioScreen' };
    this.show(map[section]);
    document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
    event.target.closest('.nav-item').classList.add('active');
  },

  checkUpdate() {
    const CURRENT_VERSION = '0.1.0';
    const btn = document.getElementById('updateBtn');
    let current = localStorage.getItem('nexus_version');
    if (!current) { current = CURRENT_VERSION; localStorage.setItem('nexus_version', current); }
    btn.disabled = true; btn.textContent = 'Verificando...';
    fetch('https://api.github.com/repos/tafasad/remote-location/releases/latest')
      .then(r => r.ok ? r.json() : Promise.reject())
      .then(j => {
        const latest = j.tag_name || '0.0.0';
        if (latest !== current) {
          btn.disabled = false; btn.textContent = 'Atualizar Nexus (' + latest + ')';
          btn.style.display = 'block';
          btn.onclick = () => {
            const asset = (j.assets || []).find(a => a.name.endsWith('.apk'));
            const url = asset ? asset.browser_download_url : j.html_url;
            if (asset && window.NexusApp && NexusApp.downloadApk) {
              NexusApp.downloadApk(url);
            } else {
              window.open(url, '_blank');
            }
          };
        } else {
          btn.textContent = 'Atualizado';
          btn.disabled = true; btn.style.display = 'block';
          setTimeout(() => { btn.style.display = 'none'; }, 3000);
        }
      })
      .catch(() => {
        btn.textContent = 'Verificar atualizacao';
        btn.disabled = false;
      });
  }
};

document.getElementById('chatInput').addEventListener('keydown', e => { if (e.key === 'Enter') app.sendChat(); });
</script>
</body>
</html>
