<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
<meta name="theme-color" content="#0a0a0a">
<meta name="apple-mobile-web-app-capable" content="yes">
<title>Nexus</title>
<link rel="manifest" href="/manifest.json">
<script>
if ('serviceWorker' in navigator) { navigator.serviceWorker.register('/sw.js').catch(() => {}); }
</script>
<script src="https://cdn.tailwindcss.com"></script>
<script>
tailwind.config = {
  darkMode: 'class',
  theme: {
    extend: {
      colors: {
        background: '#0a0a0a',
        foreground: '#f4f4f5',
        card: '#141414',
        'card-2': '#0f0f0f',
        border: '#262626',
        muted: '#a1a1aa',
        chat: '#FF6B6B',
        room: '#4ECDC4',
        loc: '#FFD93D',
        photo: '#A78BFA',
        primary: { DEFAULT: '#fff', foreground: '#000' }
      },
      boxShadow: {
        soft: '0 10px 30px rgba(0,0,0,0.45)',
        glow: '0 0 0 1px rgba(255,255,255,0.04) inset'
      }
    }
  }
}
</script>
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<style>
html, body { height: 100%; overflow: hidden; }
.screen { display: none; flex-direction: column; height: 100%; }
.screen.active { display: flex; }
.glass {
  background: rgba(20,20,20,0.85);
  backdrop-filter: blur(20px);
  -webkit-backdrop-filter: blur(20px);
  border: 1px solid rgba(255,255,255,0.06);
}
.input-dark {
  width: 100%;
  padding: 16px 14px;
  border-radius: 14px;
  border: 1px solid rgba(255,255,255,0.08);
  background: rgba(0,0,0,0.5);
  color: #fff;
  font-size: 18px;
  text-align: center;
  letter-spacing: 6px;
  font-weight: 700;
  outline: none;
  transition: border-color 0.15s;
}
.input-dark:focus { border-color: rgba(255,255,255,0.35); }
.input-dark::placeholder { color: #555; letter-spacing: 0; font-weight: 400; font-size: 15px; }
.btn {
  display: inline-flex;
  align-items: center;
  justify-content: center;
  padding: 14px 18px;
  border-radius: 14px;
  border: none;
  font-weight: 700;
  font-size: 15px;
  cursor: pointer;
  transition: transform 0.1s, opacity 0.15s;
}
.btn:active { transform: scale(0.97); }
.msg-bubble {
  padding: 12px 15px;
  border-radius: 16px;
  background: linear-gradient(180deg, rgba(255,255,255,0.06), rgba(255,255,255,0.02));
  border: 1px solid rgba(255,255,255,0.08);
}
.map-wrap { border-radius: 16px; overflow: hidden; border: 1px solid rgba(255,255,255,0.08); }
input[type="file"] { display: none; }
</style>
</head>
<body class="bg-background text-foreground antialiased">

<div id="menuScreen" class="screen active">
  <div class="flex flex-1 items-center justify-center p-6">
    <div class="w-full max-w-md">
      <div class="mb-10 text-center">
        <div class="mx-auto h-20 w-20 rounded-3xl bg-gradient-to-br from-white/10 to-white/0 border border-white/10 shadow-soft flex items-center justify-center text-3xl mb-4">⬡</div>
        <h1 class="text-4xl font-semibold tracking-tight">NEXUS</h1>
      </div>
      <div class="grid grid-cols-2 gap-4">
        <button onclick="openSection('chat')" class="glass rounded-2xl p-5 text-left hover:border-white/15 transition-colors">
          <div class="text-2xl mb-2">💬</div>
          <div class="text-sm font-semibold text-chat">Conversas</div>
        </button>
        <button onclick="openSection('room')" class="glass rounded-2xl p-5 text-left hover:border-white/15 transition-colors">
          <div class="text-2xl mb-2">🔒</div>
          <div class="text-sm font-semibold text-room">Salas</div>
        </button>
        <button onclick="openSection('location')" class="glass rounded-2xl p-5 text-left hover:border-white/15 transition-colors">
          <div class="text-2xl mb-2">📍</div>
          <div class="text-sm font-semibold text-loc">Localização</div>
        </button>
        <button onclick="openSection('photo')" class="glass rounded-2xl p-5 text-left hover:border-white/15 transition-colors">
          <div class="text-2xl mb-2">📷</div>
          <div class="text-sm font-semibold text-photo">Fotos</div>
        </button>
      </div>
    </div>
  </div>
</div>

<div id="pinScreen" class="screen">
  <div class="flex flex-1 items-center justify-center p-6">
    <div class="glass w-full max-w-md rounded-3xl p-6 shadow-soft">
      <h2 id="pinTitle" class="text-xl font-semibold mb-1">Acessar</h2>
      <p id="pinHint" class="text-sm text-muted mb-5">Digite o PIN para entrar</p>
      <input type="text" id="pinInput" class="input-dark mb-3" inputmode="numeric" placeholder="PIN">
      <input type="text" id="wordInput" class="input-dark mb-5" placeholder="Palavra (opcional)" style="letter-spacing:0; font-size:16px; font-weight: 500;">
      <div class="flex gap-3">
        <button onclick="submitPin()" class="btn bg-white text-black flex-1">Entrar</button>
        <button onclick="showMenu()" class="btn bg-white/10 text-white flex-1">Voltar</button>
      </div>
    </div>
  </div>
</div>

<div id="featureScreen" class="screen">
  <header class="flex items-center justify-between px-5 py-3 border-b border-white/6">
    <h3 id="featureTitle" class="text-base font-semibold">Conversas</h3>
    <div class="flex gap-2">
      <button id="featureCreateBtn" onclick="featureCreate()" class="btn bg-white/10 text-white !py-2 !px-3 text-xs">Enviar</button>
      <button onclick="showMenu()" class="btn bg-white/10 text-white !py-2 !px-3 text-xs">Sair</button>
    </div>
  </header>
  <div id="featureContent" class="flex-1 overflow-y-auto p-4 space-y-3"></div>
  <div id="featureFooter" class="p-3 border-t border-white/6"></div>
</div>

<script>
const API = window.location.origin;
let currentSection = '';
let currentPin = '';
let currentWord = '';
let ws = null;
let watchId = null;
let map = null;
let marker = null;

function $(id) { return document.getElementById(id); }

function show(id) {
  document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
  $(id).classList.add('active');
}

function showMenu() {
  cleanup();
  show('menuScreen');
}

function openSection(section) {
  currentSection = section;
  const titles = { chat: 'Conversas', room: 'Salas', location: 'Localização', photo: 'Fotos' };
  const hints = { chat: 'Digite o PIN da conversa', room: 'Digite o PIN da sala', location: 'Digite o PIN da localização', photo: 'Digite o PIN das fotos' };
  $('pinTitle').textContent = titles[section];
  $('pinHint').textContent = hints[section];
  $('pinInput').value = '';
  $('wordInput').value = '';
  $('featureCreateBtn').style.display = 'inline-flex';
  show('pinScreen');
  setTimeout(() => $('pinInput').focus(), 100);
}

function submitPin() {
  const pin = $('pinInput').value.trim();
  const word = $('wordInput').value.trim();
  if (!pin || pin.length < 3) return alert('PIN muito curto');
  currentPin = pin;
  currentWord = word;
  loadFeature(pin, word);
}

function loadFeature(pin, word) {
  const endpoint = {
    chat: `/api/rooms/${pin}/messages`,
    room: `/api/rooms/${pin}/messages`,
    location: `/api/rooms/${pin}/locations`,
    photo: `/api/rooms/${pin}/photos`
  };
  const qs = word ? `?word=${encodeURIComponent(word)}` : '';
  fetch(`${endpoint[currentSection]}${qs}`)
    .then(r => r.json())
    .then(data => renderFeature(data, word))
    .catch(e => alert('Erro: ' + e.message));
}

function renderFeature(data, word) {
  const content = $('featureContent');
  const footer = $('featureFooter');
  content.innerHTML = '';
  footer.innerHTML = '';
  const hasWord = !!word;

  if (currentSection === 'chat' || currentSection === 'room') {
    $('featureTitle').textContent = currentSection === 'chat' ? 'Conversas' : 'Salas';
    $('featureCreateBtn').textContent = 'Enviar';
    const msgs = data.messages || [];
    if (msgs.length === 0) {
      content.innerHTML = '<div class="text-center text-muted text-sm pt-10">Nenhuma mensagem ainda</div>';
    } else {
      msgs.forEach(m => appendMessage(m, hasWord));
    }
    if (hasWord) {
      const row = document.createElement('div');
      row.className = 'flex gap-2';
      row.innerHTML = `<input id="msgInput" placeholder="Mensagem..." class="flex-1 rounded-xl bg-black/50 border border-white/8 px-3 py-2 text-sm outline-none focus:border-white/30">`;
      footer.appendChild(row);
      footer.insertAdjacentHTML('beforeend', `<button onclick="sendMessage()" class="btn bg-white text-black ml-2 !py-2 !px-3 text-xs">Enviar</button>`);
      setupWS();
    }
  } else if (currentSection === 'location') {
    $('featureTitle').textContent = 'Localização';
    $('featureCreateBtn').style.display = 'none';
    const locs = data.locations || [];
    content.innerHTML = '';
    if (locs.length === 0) {
      content.innerHTML = '<div class="text-center text-muted text-sm pt-10">Nenhuma localização compartilhada</div>';
    } else {
      const mapDiv = document.createElement('div');
      mapDiv.id = 'map';
      mapDiv.className = 'map-wrap';
      mapDiv.style.cssText = 'width:100%;height:320px;';
      content.appendChild(mapDiv);
      setTimeout(() => {
        map = L.map('map').setView([locs[locs.length-1].lat || 0, locs[locs.length-1].lng || 0], 13);
        L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', { attribution: '&copy; OpenStreetMap' }).addTo(map);
        locs.forEach(l => L.marker([l.lat, l.lng]).addTo(map).bindPopup(new Date(l.ts).toLocaleString()).openPopup());
      }, 100);
    }
    if (hasWord) {
      footer.innerHTML = `<button onclick="shareLocation()" class="btn bg-loc text-black w-full">Compartilhar localização agora</button>`;
      setupWS();
    }
  } else if (currentSection === 'photo') {
    $('featureTitle').textContent = 'Fotos';
    $('featureCreateBtn').textContent = 'Tirar foto';
    const photos = data.photos || [];
    if (photos.length === 0) {
      content.innerHTML = '<div class="text-center text-muted text-sm pt-10">Nenhuma foto. Tire a primeira!</div>';
    } else {
      const grid = document.createElement('div');
      grid.className = 'grid grid-cols-2 gap-3';
      photos.forEach(p => {
        const card = document.createElement('div');
        card.className = 'glass rounded-2xl overflow-hidden aspect-square';
        const img = document.createElement('img');
        img.src = p.data;
        card.appendChild(img);
        grid.appendChild(card);
      });
      content.appendChild(grid);
    }
    if (hasWord) {
      footer.innerHTML = `
        <label class="btn bg-white/10 text-white w-full cursor-pointer text-center">
          <input type="file" id="photoInput" accept="image/*" capture="environment" onchange="uploadPhoto()">
          📸 Câmera
        </label>
        <button onclick="document.getElementById('photoInput').click()" class="btn bg-photo text-black w-full mt-2">🖼 Galeria</button>
      `;
      setupWS();
    }
  }

  show('featureScreen');
}

function appendMessage(m, hasWord) {
  const content = $('featureContent');
  const div = document.createElement('div');
  div.className = 'msg-bubble';
  const who = document.createElement('div');
  who.className = 'text-xs text-muted mb-1';
  if (hasWord) {
    const idx = m.text.indexOf(':');
    who.textContent = idx > -1 ? m.text.slice(0, idx) : 'Anon';
    const text = document.createElement('div');
    text.className = 'text-sm leading-relaxed';
    text.textContent = idx > -1 ? m.text.slice(idx + 2) : m.text;
    div.appendChild(text);
  } else {
    who.textContent = '🔒 Criptografado';
    const text = document.createElement('div');
    text.className = 'text-sm text-muted';
    text.textContent = (m.data || m.text || '').substring(0, 60) + '...';
    div.appendChild(text);
  }
  div.prepend(who);
  content.appendChild(div);
  content.scrollTop = content.scrollHeight;
}

function setupWS() {
  cleanup();
  const wsUrl = `ws://${window.location.host}/ws?room=${encodeURIComponent(currentPin)}&word=${encodeURIComponent(currentWord)}`;
  ws = new WebSocket(wsUrl);
  ws.onopen = () => {};
  ws.onmessage = (evt) => {
    const msg = JSON.parse(evt.data);
    if (msg.type === 'message' && msg.msg) appendMessage(msg.msg, !!currentWord);
    if (msg.type === 'location' && msg.loc) {
      if (!map) {
        const content = $('featureContent');
        const mapDiv = document.createElement('div');
        mapDiv.id = 'map';
        mapDiv.className = 'map-wrap';
        mapDiv.style.cssText = 'width:100%;height:320px;margin-top:10px;';
        content.appendChild(mapDiv);
        setTimeout(() => {
          map = L.map('map').setView([msg.loc.lat, msg.loc.lng], 16);
          L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', { attribution: '&copy; OpenStreetMap' }).addTo(map);
        }, 100);
      }
      L.marker([msg.loc.lat, msg.loc.lng]).addTo(map).bindPopup(new Date(msg.loc.ts).toLocaleString()).openPopup();
      map.setView([msg.loc.lat, msg.loc.lng], 16);
    }
    if (msg.type === 'photo' && msg.photo) {
      if (currentWord) {
        const keyHex = deriveKeySync(currentWord, currentPin);
        const dec = decryptSync(keyHex, msg.photo.iv, msg.photo.data);
        if (dec) {
          let grid = document.querySelector('.photo-grid');
          if (!grid) {
            grid = document.createElement('div');
            grid.className = 'grid grid-cols-2 gap-3';
            $('featureContent').appendChild(grid);
          }
          const card = document.createElement('div');
          card.className = 'glass rounded-2xl overflow-hidden aspect-square';
          const img = document.createElement('img');
          img.src = dec;
          card.appendChild(img);
          grid.insertBefore(card, grid.firstChild);
        }
      }
    }
  };
}

function featureCreate() {
  if (currentSection === 'chat' || currentSection === 'room') {
    const input = document.getElementById('msgInput');
    if (input) input.focus();
  } else if (currentSection === 'photo') {
    document.getElementById('photoInput')?.click();
  }
}

function sendMessage() {
  const input = document.getElementById('msgInput');
  const text = input.value.trim();
  if (!text) return;
  if (!ws || ws.readyState !== WebSocket.OPEN) return alert('Conecte-se primeiro');
  const keyHex = currentWord ? deriveKeySync(currentWord, currentPin) : null;
  let iv = '', data = '';
  if (keyHex) {
    const enc = encryptSync(keyHex, text);
    iv = enc.iv; data = enc.data;
  } else {
    data = Buffer.from(text, 'utf8').toString('base64');
  }
  ws.send(JSON.stringify({ type: 'message', text, iv, data, ts: Date.now() }));
  appendMessage({ text, iv, data, ts: Date.now() }, !!currentWord);
  input.value = '';
}

function shareLocation() {
  if (!navigator.geolocation) return alert('GPS indisponível');
  navigator.geolocation.getCurrentPosition(
    (pos) => {
      const { latitude, longitude } = pos.coords;
      if (ws && ws.readyState === WebSocket.OPEN) {
        ws.send(JSON.stringify({ type: 'location', lat: latitude, lng: longitude }));
      }
    },
    (err) => alert('Erro GPS: ' + err.message),
    { enableHighAccuracy: true, timeout: 10000 }
  );
}

function uploadPhoto() {
  const input = document.getElementById('photoInput');
  const file = input.files[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = (e) => {
    const data = e.target.result;
    if (ws && ws.readyState === WebSocket.OPEN) {
      const keyHex = currentWord ? deriveKeySync(currentWord, currentPin) : null;
      let iv = '', encData = data;
      if (keyHex) {
        const enc = encryptSync(keyHex, data);
        iv = enc.iv; encData = enc.data;
      }
      ws.send(JSON.stringify({ type: 'photo', photo: { iv, data: encData, ts: Date.now() } }));
      let grid = document.querySelector('.photo-grid') || (() => { const g = document.createElement('div'); g.className = 'grid grid-cols-2 gap-3'; $('featureContent').appendChild(g); return g; })();
      const card = document.createElement('div'); card.className = 'glass rounded-2xl overflow-hidden aspect-square';
      const img = document.createElement('img'); img.src = data; card.appendChild(img); grid.insertBefore(card, grid.firstChild);
    }
  };
  reader.readAsDataURL(file);
}

function cleanup() {
  if (ws) { try { ws.close(); } catch (e) {} ws = null; }
  if (watchId !== null) { navigator.geolocation.clearWatch(watchId); watchId = null; }
  if (map) { map.remove(); map = null; }
}

function deriveKeySync(word, pin) {
  const enc = new TextEncoder();
  const keyMaterial = crypto.subtle.importKey('raw', enc.encode(word), 'PBKDF2', false, ['deriveKey']);
  return crypto.subtle.deriveKey({ name: 'PBKDF2', salt: enc.encode(pin), iterations: 100000, hash: 'SHA-256' }, keyMaterial, { name: 'AES-GCM', length: 256 }, false, ['encrypt', 'decrypt']).then(k => crypto.subtle.exportKey('raw', k).then(b => Array.from(new Uint8Array(b)).map(x => x.toString(16).padStart(2, '0')).join('')));
}

function encryptSync(keyHex, plaintext) {
  return new Promise((resolve) => {
    crypto.subtle.importKey('raw', hexToBytes(keyHex), 'AES-GCM', false, ['encrypt']).then(key => {
      const iv = crypto.getRandomValues(new Uint8Array(12));
      crypto.subtle.encrypt({ name: 'AES-GCM', iv }, key, new TextEncoder().encode(plaintext)).then(cipher => {
        resolve({ iv: btoa(String.fromCharCode(...iv)), data: btoa(String.fromCharCode(...new Uint8Array(cipher))) });
      });
    });
  });
}

function decryptSync(keyHex, ivB64, dataB64) {
  return new Promise((resolve) => {
    crypto.subtle.importKey('raw', hexToBytes(keyHex), 'AES-GCM', false, ['decrypt']).then(key => {
      const iv = Uint8Array.from(atob(ivB64), c => c.charCodeAt(0));
      const data = Uint8Array.from(atob(dataB64), c => c.charCodeAt(0));
      crypto.subtle.decrypt({ name: 'AES-GCM', iv }, key, data).then(plain => {
        resolve(new TextDecoder().decode(plain));
      }).catch(() => resolve(null));
    });
  });
}

function hexToBytes(hex) {
  const bytes = new Uint8Array(hex.length / 2);
  for (let i = 0; i < hex.length; i += 2) bytes[i / 2] = parseInt(hex.substr(i, 2), 16);
  return bytes;
}

async function deriveKey(word, pin) { return await deriveKeySync(word, pin); }
async function encrypt(keyHex, plaintext) { return await encryptSync(keyHex, plaintext); }
async function decrypt(keyHex, iv, data) { return await decryptSync(keyHex, iv, data); }

document.getElementById('pinInput').addEventListener('keydown', (e) => { if (e.key === 'Enter') submitPin(); });
window.addEventListener('beforeunload', cleanup);
</script>
</body>
</html>
