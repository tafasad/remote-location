<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
<meta name="theme-color" content="#0a0a0a">
<meta name="apple-mobile-web-app-capable" content="yes">
<title>Nexus</title>
<link rel="manifest" href="/manifest.json">
<script>
if ('serviceWorker' in navigator) { navigator.serviceWorker.register('/sw.js').catch(() => {}); }
</script>
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
:root {
  --bg: #0a0a0a;
  --card: #141414;
  --border: #262626;
  --text: #fff;
  --muted: #888;
  --chat: #FF6B6B;
  --room: #4ECDC4;
  --loc: #FFD93D;
  --photo: #A78BFA;
}
html, body { height: 100%; overflow: hidden; }
body {
  font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
  background: var(--bg); color: var(--text);
  display: flex; flex-direction: column;
}
.screen { display: none; flex-direction: column; height: 100%; }
.screen.active { display: flex; }

/* MAIN MENU */
#menuScreen { align-items: center; justify-content: center; padding: 20px; }
.menu-title { font-size: 32px; font-weight: 800; margin-bottom: 8px; letter-spacing: -1px; }
.menu-sub { color: var(--muted); margin-bottom: 32px; font-size: 14px; }
.grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; width: 100%; max-width: 400px; }
.card {
  background: var(--card); border: 1px solid var(--border); border-radius: 16px;
  padding: 24px 16px; text-align: center; cursor: pointer;
  transition: transform 0.15s, border-color 0.15s;
  box-shadow: 0 10px 25px rgba(0,0,0,0.45);
}
.card:active { transform: scale(0.96); }
.card .icon { font-size: 36px; margin-bottom: 8px; }
.card .label { font-size: 14px; font-weight: 600; }
.card.chat { border-color: var(--chat); }
.card.chat .label { color: var(--chat); }
.card.room { border-color: var(--room); }
.card.room .label { color: var(--room); }
.card.loc { border-color: var(--loc); }
.card.loc .label { color: var(--loc); }
.card.photo { border-color: var(--photo); }
.card.photo .label { color: var(--photo); }

/* PIN SCREEN */
#pinScreen { align-items: center; justify-content: center; padding: 20px; }
.pin-card {
  background: var(--card); border: 1px solid var(--border); border-radius: 16px;
  padding: 28px 24px; width: 100%; max-width: 380px;
  box-shadow: 0 15px 35px rgba(0,0,0,0.55);
}
.pin-title { font-size: 20px; font-weight: 700; margin-bottom: 4px; }
.pin-hint { color: var(--muted); font-size: 13px; margin-bottom: 20px; }
.pin-input {
  width: 100%; padding: 16px; border-radius: 12px; border: 1px solid var(--border);
  background: #000; color: #fff; font-size: 24px; text-align: center;
  letter-spacing: 6px; font-weight: 700;
}
.pin-input:focus { outline: none; border-color: var(--accent, #fff); }
.word-input {
  width: 100%; padding: 14px; border-radius: 12px; border: 1px solid var(--border);
  background: #000; color: #fff; font-size: 16px; margin-top: 12px;
}
.word-input:focus { outline: none; border-color: var(--accent, #fff); }
.pin-actions { display: flex; gap: 10px; margin-top: 16px; }
.pin-actions button {
  flex: 1; padding: 14px; border-radius: 12px; border: none;
  background: var(--accent, #fff); color: #000; font-weight: 700; font-size: 15px; cursor: pointer;
}
.pin-actions button.secondary { background: #222; color: #fff; }
.encrypted-note { color: var(--muted); font-size: 12px; margin-top: 12px; text-align: center; }
.back-btn {
  margin-top: 16px; padding: 10px 18px; border-radius: 10px; border: 1px solid var(--border);
  background: transparent; color: var(--muted); cursor: pointer; font-size: 13px;
}

/* FEATURE SCREENS */
#featureScreen { background: var(--bg); }
.feature-header {
  display: flex; align-items: center; justify-content: space-between;
  padding: 14px 18px; border-bottom: 1px solid var(--border);
}
.feature-header .title { font-size: 17px; font-weight: 700; }
.feature-header .actions { display: flex; gap: 8px; }
.small-btn {
  padding: 8px 14px; border-radius: 8px; border: none;
  font-size: 13px; font-weight: 600; cursor: pointer;
}
.content { flex: 1; overflow-y: auto; padding: 14px; }

/* CHAT */
.chat-msg { margin-bottom: 12px; }
.chat-msg .who { font-size: 12px; color: var(--muted); margin-bottom: 2px; }
.chat-msg .text { background: #1a1a1a; padding: 10px 14px; border-radius: 12px; font-size: 14px; line-height: 1.4; }
.chat-msg.me .text { background: #2a1a1a; }
.chat-input-row { display: flex; gap: 8px; padding: 12px 14px; border-top: 1px solid var(--border); }
.chat-input-row input { flex: 1; padding: 12px; border-radius: 10px; border: 1px solid var(--border); background: #000; color: #fff; font-size: 15px; }
.chat-input-row button { padding: 10px 18px; border-radius: 10px; border: none; background: var(--chat); color: #000; font-weight: 700; cursor: pointer; }

/* ROOMS */
.room-list-item {
  background: var(--card); border: 1px solid var(--border); border-radius: 12px;
  padding: 16px; margin-bottom: 10px;
}
.room-list-item .name { font-size: 15px; font-weight: 600; margin-bottom: 4px; }
.room-list-item .meta { font-size: 12px; color: var(--muted); }

/* LOCATION */
#map { width: 100%; height: 100%; background: #000; }
.loc-status { padding: 12px 14px; border-top: 1px solid var(--border); font-size: 13px; color: var(--muted); text-align: center; }
.loc-share-btn { margin: 10px 14px; padding: 14px; border-radius: 12px; border: none; background: var(--loc); color: #000; font-weight: 700; cursor: pointer; }

/* PHOTOS */
.photo-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }
.photo-card {
  aspect-ratio: 1; border-radius: 12px; overflow: hidden; border: 1px solid var(--border);
  background: #0f0f0f; display: flex; align-items: center; justify-content: center;
}
.photo-card img { width: 100%; height: 100%; object-fit: cover; }
.photo-actions { padding: 10px 14px; border-top: 1px solid var(--border); display: flex; gap: 8px; }
.photo-actions input[type="file"] { display: none; }
.photo-actions label, .photo-actions button {
  flex: 1; padding: 10px; border-radius: 10px; text-align: center;
  background: #222; color: #fff; font-size: 13px; font-weight: 600; cursor: pointer; border: none;
}
.photo-actions button { background: var(--photo); color: #000; }

.empty {
  text-align: center; padding: 40px 20px; color: var(--muted); font-size: 14px;
}

/* Section accent classes */
.section-chat { --accent: var(--chat); }
.section-room { --accent: var(--room); }
.section-loc { --accent: var(--loc); }
.section-photo { --accent: var(--photo); }

input:disabled { opacity: 0.6; }
</style>
</head>
<body>

<!-- MAIN MENU -->
<div id="menuScreen" class="screen active">
  <div class="menu-title">NEXUS</div>
  <div class="grid">
    <div class="card chat" onclick="openSection('chat')">
      <div class="icon">💬</div>
      <div class="label">Conversas</div>
    </div>
    <div class="card room" onclick="openSection('room')">
      <div class="icon">🔒</div>
      <div class="label">Salas</div>
    </div>
    <div class="card loc" onclick="openSection('location')">
      <div class="icon">📍</div>
      <div class="label">Localização</div>
    </div>
    <div class="card photo" onclick="openSection('photo')">
      <div class="icon">📷</div>
      <div class="label">Fotos</div>
    </div>
  </div>
</div>

<!-- PIN SCREEN -->
<div id="pinScreen" class="screen">
  <div class="pin-card">
    <div class="pin-title" id="pinTitle">Acessar</div>
    <div class="pin-hint" id="pinHint">Digite o PIN para entrar</div>
    <input type="text" id="pinInput" class="pin-input" inputmode="numeric" maxlength="20" placeholder="PIN">
    <input type="text" id="wordInput" class="word-input" placeholder="Palavra (opcional)">
    <div class="pin-actions">
      <button id="pinActionBtn" onclick="submitPin()">Entrar</button>
      <button class="secondary" onclick="showMenu()">Voltar</button>
    </div>
    <div class="encrypted-note" id="encryptedNote">Sem palavra = conteúdo criptografado</div>
  </div>
</div>

<!-- FEATURE SCREEN -->
<div id="featureScreen" class="screen">
  <div class="feature-header" id="featureHeader">
    <div class="title" id="featureTitle">Conversas</div>
    <div class="actions">
      <button class="small-btn" id="featureCreateBtn" onclick="featureCreate()">Criar</button>
      <button class="small-btn secondary" onclick="showMenu()">Sair</button>
    </div>
  </div>
  <div class="content" id="featureContent"></div>
  <div id="featureFooter"></div>
</div>

<script>
const API = window.location.origin;
let currentSection = '';
let currentPin = '';
let currentWord = '';
let ws = null;
let watchId = null;
let map = null;
let marker = null;

function $(id) { return document.getElementById(id); }

function show(id) {
  document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
  $(id).classList.add('active');
}

function showMenu() {
  cleanup();
  show('menuScreen');
}

function openSection(section) {
  currentSection = section;
  const titles = { chat: 'Conversas', room: 'Salas', location: 'Localização', photo: 'Fotos' };
  const hints = { chat: 'Digite o PIN da conversa', room: 'Digite o PIN da sala', location: 'Digite o PIN da localização', photo: 'Digite o PIN das fotos' };
  $('pinTitle').textContent = titles[section];
  $('pinHint').textContent = hints[section];
  $('pinInput').value = '';
  $('wordInput').value = '';
  $('featureCreateBtn').style.display = 'block';
  show('pinScreen');
  setTimeout(() => $('pinInput').focus(), 100);
}

function submitPin() {
  const pin = $('pinInput').value.trim();
  const word = $('wordInput').value.trim();
  if (!pin || pin.length < 3) return alert('PIN muito curto');
  currentPin = pin;
  currentWord = word;
  loadFeature(pin, word);
}

function loadFeature(pin, word) {
  const endpoint = {
    chat: `/api/rooms/${pin}/messages`,
    room: `/api/rooms/${pin}/messages`,
    location: `/api/rooms/${pin}/locations`,
    photo: `/api/rooms/${pin}/photos`
  };
  const qs = word ? `?word=${encodeURIComponent(word)}` : '';
  fetch(`${endpoint[currentSection]}${qs}`)
    .then(r => r.json())
    .then(data => renderFeature(data, word))
    .catch(e => alert('Erro: ' + e.message));
}

function renderFeature(data, word) {
  const content = $('featureContent');
  const footer = $('featureFooter');
  content.innerHTML = '';
  footer.innerHTML = '';
  const hasWord = !!word;

  if (currentSection === 'chat' || currentSection === 'room') {
    $('featureTitle').textContent = currentSection === 'chat' ? 'Conversas' : 'Salas';
    $('featureCreateBtn').textContent = 'Nova mensagem';
    const msgs = data.messages || [];
    if (msgs.length === 0) {
      content.innerHTML = '<div class="empty">Nenhuma mensagem ainda</div>';
    } else {
      msgs.forEach(m => appendMessage(m, hasWord));
    }
    if (hasWord) {
      const row = document.createElement('div');
      row.className = 'chat-input-row';
      row.innerHTML = `<input id="msgInput" placeholder="Mensagem..."><button onclick="sendMessage()">Enviar</button>`;
      footer.appendChild(row);
      setupWS();
    }
  } else if (currentSection === 'location') {
    $('featureTitle').textContent = 'Localização';
    $('featureCreateBtn').style.display = 'none';
    const locs = data.locations || [];
    if (locs.length === 0) {
      content.innerHTML = '<div class="empty">Nenhuma localização compartilhada</div>';
    } else {
      const mapDiv = document.createElement('div');
      mapDiv.id = 'map';
      mapDiv.style.cssText = 'width:100%;height:300px;border-radius:12px;border:1px solid var(--border);';
      content.appendChild(mapDiv);
      setTimeout(() => {
        map = L.map('map').setView([locs[locs.length-1].lat || 0, locs[locs.length-1].lng || 0], 13);
        L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', { attribution: '&copy; OpenStreetMap' }).addTo(map);
        locs.forEach(l => L.marker([l.lat, l.lng]).addTo(map).bindPopup(new Date(l.ts).toLocaleString()).openPopup());
      }, 100);
    }
    if (hasWord) {
      const btn = document.createElement('button');
      btn.className = 'loc-share-btn';
      btn.textContent = 'Compartilhar localização agora';
      btn.onclick = shareLocation;
      footer.appendChild(btn);
      setupWS();
    }
  } else if (currentSection === 'photo') {
    $('featureTitle').textContent = 'Fotos';
    $('featureCreateBtn').textContent = 'Tirar foto';
    const photos = data.photos || [];
    if (photos.length === 0) {
      content.innerHTML = '<div class="empty">Nenhuma foto. Tire a primeira!</div>';
    } else {
      const grid = document.createElement('div');
      grid.className = 'photo-grid';
      photos.forEach(p => {
        const card = document.createElement('div');
        card.className = 'photo-card';
        const img = document.createElement('img');
        img.src = p.data;
        card.appendChild(img);
        grid.appendChild(card);
      });
      content.appendChild(grid);
    }
    if (hasWord) {
      const row = document.createElement('div');
      row.className = 'photo-actions';
      row.innerHTML = `
        <label><input type="file" id="photoInput" accept="image/*" capture="environment" onchange="uploadPhoto()">📸 Câmera</label>
        <button onclick="document.getElementById('photoInput').click()">🖼 Galeria</button>
      `;
      footer.appendChild(row);
      setupWS();
    }
  }

  show('featureScreen');
}

function appendMessage(m, hasWord) {
  const content = $('featureContent');
  const div = document.createElement('div');
  div.className = 'chat-msg';
  const who = document.createElement('div');
  who.className = 'who';
  who.textContent = hasWord ? (m.text.split(':')[0] || 'Anon') : 'Criptografado';
  const text = document.createElement('div');
  text.className = 'text';
  text.textContent = hasWord ? (m.text.split(':').slice(1).join(':').trim() || m.text) : '🔒 ' + (m.data || m.text).substring(0, 60) + '...';
  div.appendChild(who);
  div.appendChild(text);
  content.appendChild(div);
  content.scrollTop = content.scrollHeight;
}

function setupWS() {
  cleanup();
  const wsUrl = `ws://${window.location.host}/ws?room=${encodeURIComponent(currentPin)}&word=${encodeURIComponent(currentWord)}`;
  ws = new WebSocket(wsUrl);
  ws.onopen = () => { console.log('WS conectado'); };
  ws.onmessage = (evt) => {
    const msg = JSON.parse(evt.data);
    if (msg.type === 'message' && msg.msg) appendMessage(msg.msg, !!currentWord);
    if (msg.type === 'location' && msg.loc) {
      if (!map) {
        const content = $('featureContent');
        const mapDiv = document.createElement('div');
        mapDiv.id = 'map';
        mapDiv.style.cssText = 'width:100%;height:300px;border-radius:12px;border:1px solid var(--border);margin-top:10px;';
        content.appendChild(mapDiv);
        setTimeout(() => {
          map = L.map('map').setView([msg.loc.lat, msg.loc.lng], 16);
          L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', { attribution: '&copy; OpenStreetMap' }).addTo(map);
        }, 100);
      }
      L.marker([msg.loc.lat, msg.loc.lng]).addTo(map).bindPopup(new Date(msg.loc.ts).toLocaleString()).openPopup();
      map.setView([msg.loc.lat, msg.loc.lng], 16);
    }
    if (msg.type === 'photo' && msg.photo) {
      if (currentWord) {
        const keyHex = deriveKeySync(currentWord, currentPin);
        const dec = decryptSync(keyHex, msg.photo.iv, msg.photo.data);
        if (dec) {
          const grid = document.querySelector('.photo-grid');
          if (grid) {
            const card = document.createElement('div');
            card.className = 'photo-card';
            const img = document.createElement('img');
            img.src = dec;
            card.appendChild(img);
            grid.insertBefore(card, grid.firstChild);
          }
        }
      }
    }
  };
  ws.onclose = () => console.log('WS fechado');
  ws.onerror = () => console.log('WS erro');
}

function featureCreate() {
  if (currentSection === 'chat' || currentSection === 'room') {
    const text = prompt('Mensagem:');
    if (!text) return;
    sendMessageText(text);
  } else if (currentSection === 'photo') {
    document.getElementById('photoInput')?.click();
  }
}

function sendMessage() {
  const input = document.getElementById('msgInput');
  const text = input.value.trim();
  if (!text) return;
  sendMessageText(text);
  input.value = '';
}

function sendMessageText(text) {
  if (!ws || ws.readyState !== WebSocket.OPEN) return alert('Conecte-se primeiro');
  const keyHex = currentWord ? deriveKeySync(currentWord, currentPin) : null;
  let iv = '', data = '';
  if (keyHex) {
    const enc = encryptSync(keyHex, text);
    iv = enc.iv; data = enc.data;
  } else {
    data = Buffer.from(text, 'utf8').toString('base64');
  }
  ws.send(JSON.stringify({ type: 'message', text, iv, data, ts: Date.now() }));
  appendMessage({ text, iv, data, ts: Date.now() }, !!currentWord);
}

function shareLocation() {
  if (!navigator.geolocation) return alert('GPS indisponível');
  navigator.geolocation.getCurrentPosition(
    (pos) => {
      const { latitude, longitude } = pos.coords;
      if (ws && ws.readyState === WebSocket.OPEN) {
        ws.send(JSON.stringify({ type: 'location', lat: latitude, lng: longitude }));
        alert('Localização enviada');
      }
    },
    (err) => alert('Erro GPS: ' + err.message),
    { enableHighAccuracy: true, timeout: 10000 }
  );
}

function uploadPhoto() {
  const input = document.getElementById('photoInput');
  const file = input.files[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = (e) => {
    const data = e.target.result;
    if (ws && ws.readyState === WebSocket.OPEN) {
      const keyHex = currentWord ? deriveKeySync(currentWord, currentPin) : null;
      let iv = '', encData = data;
      if (keyHex) {
        const enc = encryptSync(keyHex, data);
        iv = enc.iv; encData = enc.data;
      }
      ws.send(JSON.stringify({ type: 'photo', photo: { iv, data: encData, ts: Date.now() } }));
      const grid = document.querySelector('.photo-grid') || (() => { const g = document.createElement('div'); g.className = 'photo-grid'; $('featureContent').appendChild(g); return g; })();
      const card = document.createElement('div'); card.className = 'photo-card';
      const img = document.createElement('img'); img.src = data; card.appendChild(img); grid.insertBefore(card, grid.firstChild);
    }
  };
  reader.readAsDataURL(file);
}

function deriveKeySync(word, pin) {
  const enc = new TextEncoder();
  const keyMaterial = crypto.subtle.importKey('raw', enc.encode(word), 'PBKDF2', false, ['deriveKey']);
  return crypto.subtle.deriveKey({ name: 'PBKDF2', salt: enc.encode(pin), iterations: 100000, hash: 'SHA-256' }, keyMaterial, { name: 'AES-GCM', length: 256 }, false, ['encrypt', 'decrypt']).then(k => crypto.subtle.exportKey('raw', k).then(b => Array.from(new Uint8Array(b)).map(x => x.toString(16).padStart(2, '0')).join('')));
}

function encryptSync(keyHex, plaintext) {
  return new Promise((resolve) => {
    crypto.subtle.importKey('raw', hexToBytes(keyHex), 'AES-GCM', false, ['encrypt']).then(key => {
      const iv = crypto.getRandomValues(new Uint8Array(12));
      crypto.subtle.encrypt({ name: 'AES-GCM', iv }, key, new TextEncoder().encode(plaintext)).then(cipher => {
        resolve({ iv: btoa(String.fromCharCode(...iv)), data: btoa(String.fromCharCode(...new Uint8Array(cipher))) });
      });
    });
  });
}

function decryptSync(keyHex, ivB64, dataB64) {
  return new Promise((resolve) => {
    crypto.subtle.importKey('raw', hexToBytes(keyHex), 'AES-GCM', false, ['decrypt']).then(key => {
      const iv = Uint8Array.from(atob(ivB64), c => c.charCodeAt(0));
      const data = Uint8Array.from(atob(dataB64), c => c.charCodeAt(0));
      crypto.subtle.decrypt({ name: 'AES-GCM', iv }, key, data).then(plain => {
        resolve(new TextDecoder().decode(plain));
      }).catch(() => resolve(null));
    });
  });
}

function hexToBytes(hex) {
  const bytes = new Uint8Array(hex.length / 2);
  for (let i = 0; i < hex.length; i += 2) bytes[i / 2] = parseInt(hex.substr(i, 2), 16);
  return bytes;
}

async function deriveKey(word, pin) { return await deriveKeySync(word, pin); }
async function encrypt(keyHex, plaintext) { return await encryptSync(keyHex, plaintext); }
async function decrypt(keyHex, iv, data) { return await decryptSync(keyHex, iv, data); }

function cleanup() {
  if (ws) { try { ws.close(); } catch (e) {} ws = null; }
  if (watchId !== null) { navigator.geolocation.clearWatch(watchId); watchId = null; }
  if (map) { map.remove(); map = null; marker = null; }
}

document.getElementById('pinInput').addEventListener('keydown', (e) => { if (e.key === 'Enter') submitPin(); });
window.addEventListener('beforeunload', cleanup);
</script>
</body>
</html>
